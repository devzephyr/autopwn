# netplan config for vpn.neutron.local — 172.16.10.40 (DMZ)
# Role: OpenVPN concentrator — NATMASQs VPN clients, pushes internal routes
# Apply: sudo cp vpn.yaml /etc/netplan/99-neutron.yaml && sudo netplan apply
#
# pfSense special rules DMZ-1/2/3 allow traffic sourced from 172.16.10.40
# to reach VLAN10, VLAN20, and VLAN30 (DC segment).
# VPN clients get privdns (172.16.12.11) pushed as DNS so neutron.local resolves.
#
# Adjust 'enp0s3' to match your actual interface: ip link show
network:
  version: 2
  ethernets:
    enp0s3:
      addresses:
        - 172.16.10.40/28
      routes:
        - to: 0.0.0.0/0
          via: 172.16.10.33
        - to: 172.16.10.0/28
          via: 172.16.10.33
        - to: 172.16.10.16/28
          via: 172.16.10.33
        - to: 172.16.12.0/27
          via: 172.16.10.33
      nameservers:
        addresses:
          - 172.16.12.11
          - 8.8.8.8
      dhcp4: false
