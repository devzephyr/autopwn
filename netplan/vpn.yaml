# netplan config for vpn.neutron.local — 172.16.30.30 (VLAN30/DMZ)
# Role: OpenVPN concentrator — pushes routes to VLAN10/20/30 for VPN clients
# Apply: sudo cp vpn.yaml /etc/netplan/99-neutron.yaml && sudo netplan apply
#
# Specific routes for VLAN10 and VLAN20 ensure VPN-NATed client traffic
# is forwarded correctly through pfSense (not leaked via eth0 NAT).
# The VPN server (172.16.30.30) has a special pfSense rule (V30-1/V30-1b)
# allowing it to reach VLAN10 and VLAN20 — hence privdns works as DNS here.
#
# Adjust 'enp0s3' to match your actual interface: ip link show
network:
  version: 2
  ethernets:
    enp0s3:
      addresses:
        - 172.16.30.30/24
      routes:
        - to: 0.0.0.0/0
          via: 172.16.30.1
        - to: 172.16.10.0/24
          via: 172.16.30.1
        - to: 172.16.20.0/24
          via: 172.16.30.1
      nameservers:
        addresses:
          - 172.16.10.53
          - 8.8.8.8
      dhcp4: false
