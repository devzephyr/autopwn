# netplan config for kali.neutron.local — 172.16.40.50 (VLAN40/External)
# Role: attacker machine — autopwn.py runs from here
# Apply: sudo cp kali.yaml /etc/netplan/99-neutron.yaml && sudo netplan apply
#
# DNS: pubdns (172.16.30.10) before VPN — neutron.local returns NXDOMAIN.
# After VPN pivot, OpenVPN pushes privdns so internal names resolve.
#
# Adjust 'enp0s3' to match your actual interface: ip link show
network:
  version: 2
  ethernets:
    enp0s3:
      addresses:
        - 172.16.40.50/24
      routes:
        - to: 0.0.0.0/0
          via: 172.16.40.1
      nameservers:
        addresses:
          - 172.16.30.10
          - 8.8.8.8
      dhcp4: false
